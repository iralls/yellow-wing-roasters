<a href="{{ '/order/' | relative_url }}" class="cart-indicator" id="ywr-cart-indicator" aria-label="View order">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
    <line x1="3" y1="6" x2="21" y2="6"/>
    <path d="M16 10a4 4 0 0 1-8 0"/>
  </svg>
  <span class="cart-count" id="ywr-cart-count" aria-live="polite">0</span>
</a>

<script>
  (function () {
    function getCount() {
      try {
        var raw = sessionStorage.getItem('ywr_cart');
        if (!raw) return 0;
        var c = JSON.parse(raw);
        var total = 0;
        for (var k in c) {
          if (Object.prototype.hasOwnProperty.call(c, k)) {
            var n = parseInt(c[k], 10);
            if (!isNaN(n) && n > 0) total += n;
          }
        }
        return total;
      } catch (e) { return 0; }
    }
    function update() {
      var indicator = document.getElementById('ywr-cart-indicator');
      var el = document.getElementById('ywr-cart-count');
      if (!indicator || !el) return;
      var n = getCount();
      el.textContent = n;
      indicator.classList.toggle('cart-indicator-empty', n === 0);
    }
    update();
    window.addEventListener('pageshow', update);
    window.addEventListener('ywr-cart-changed', update);
    window.addEventListener('storage', update);
  })();
</script>
